version: 2
updates:
  - package-ecosystem: bun
    directory: "/"
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: "/apps/server"
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: "/apps/web"
    schedule:
      interval: weekly
