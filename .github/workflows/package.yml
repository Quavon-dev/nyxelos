name: create-nyxel package

on:
  pull_request:
    branches: [main]
    paths:
      - packages/create-nyxel/**
      - .github/workflows/package.yml
  push:
    branches: [main]
    tags: ["create-nyxel@*"]
    paths:
      - packages/create-nyxel/**
      - .github/workflows/package.yml

concurrency:
  group: package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run --cwd packages/create-nyxel typecheck
      - run: bun run --cwd packages/create-nyxel build
      - name: Smoke test the CLI
        run: |
          node packages/create-nyxel/dist/index.js --help
          node packages/create-nyxel/dist/index.js --mode pc --dir /tmp/create-nyxel-smoke-pc --yes
          node packages/create-nyxel/dist/index.js --mode server --domain nyxel.example.com --dir /tmp/create-nyxel-smoke-server --yes
          test -f /tmp/create-nyxel-smoke-pc/docker-compose.yml
          test -f /tmp/create-nyxel-smoke-server/Caddyfile

  publish:
    name: Publish to npm
    needs: build
    if: startsWith(github.ref, 'refs/tags/create-nyxel@')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile
      - run: bun run --cwd packages/create-nyxel build

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/create-nyxel@}"
          PKG_VERSION=$(node -p "require('./packages/create-nyxel/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag create-nyxel@$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish
        working-directory: packages/create-nyxel
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
