name: Secret scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    # Runs the OSS gitleaks CLI binary directly rather than
    # gitleaks/gitleaks-action@v2 — that Action added an organization
    # license requirement (see https://github.com/gitleaks/gitleaks-action's
    # announcement) and has been failing on every run for this org account
    # ("missing gitleaks license") without ever completing an actual scan.
    # The underlying gitleaks tool itself remains free/OSS; this step just
    # downloads and runs it without the Action wrapper.
    #
    # Kept non-blocking until this fixed version's first real run (the repo
    # has never actually been scanned before — every prior run failed on the
    # license check above, before gitleaks itself ran) is reviewed. Flip to
    # blocking once that run's findings, if any, have been triaged.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -sSL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
      - name: Run gitleaks
        run: ./gitleaks detect --source . --log-opts="--all" --redact -v
