name: Secret scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    # Non-blocking on first rollout — a full-history scan against this repo
    # hasn't been triaged yet (see docs/CI_QUALITY_GATES.md and
    # docs/SECURITY_AUDIT.md SEC-06 for the nyxel.sqlite* history question
    # this is meant to catch going forward). Flip to blocking once the first
    # run's findings, if any, have been reviewed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
